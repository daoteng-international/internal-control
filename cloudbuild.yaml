steps:
  # 0. Ensure Gemini is configured before deploying AI features
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'Check Gemini API Key'
    entrypoint: bash
    args:
      - '-c'
      - |
        if [ -z "$_GEMINI_API_KEY" ]; then
          echo "Missing Cloud Build substitution: _GEMINI_API_KEY"
          echo "Set it on the Cloud Build trigger or pass --substitutions=_GEMINI_API_KEY=..."
          exit 1
        fi

  # 1. Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Docker Image'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/dt-internal-control:${_IMAGE_TAG}', '.']

  # 2. Push the container image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Docker Image'
    args: ['push', 'gcr.io/$PROJECT_ID/dt-internal-control:${_IMAGE_TAG}']

  # 3. Deploy container image to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy to Cloud Run'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'dt-internal-control'
      - '--image'
      - 'gcr.io/$PROJECT_ID/dt-internal-control:${_IMAGE_TAG}'
      - '--region'
      - 'us-west1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GEMINI_API_KEY=${_GEMINI_API_KEY},GEMINI_MODEL=${_GEMINI_MODEL}'

images:
  - 'gcr.io/$PROJECT_ID/dt-internal-control:${_IMAGE_TAG}'

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _GEMINI_API_KEY: ''
  _GEMINI_MODEL: 'gemini-flash-latest'
  _IMAGE_TAG: '${COMMIT_SHA}'
